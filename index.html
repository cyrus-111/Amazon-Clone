<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="navbar">
            <div class="nav-logo border">
                <div class="logo"></div>

            </div>

            <div class="nav-address border">

                <p class="add-first">Delivering to Mumbai 400104</p>
                <div class="add-icon">
                    <i class="fa-solid fa-location-dot"></i>
                    <p class="add-sec">Update location</p>
                </div>

            </div>

            <div class="nav-search border">
                <select class="search-select">
                    <option>
                        All
                    </option>
                </select>
                <input placeholder="Search Amazon.in" class="search-input">
                <div class="search-icon">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>


            </div>

            <div class="nav-language border">
                <div class="country"> <img src="flag.png" alt="Indian Flag" width="22px" height="16px">
                </div>
                <select class="language">
                    <option>
                        EN
                    </option>
                </select>


            </div>

            <div class="nav-signin border">
                <p><span>Hello, sign in</span></p>
                <p><select class="list">
                        <option>Account & Lists</option>
                    </select></p>
            </div>

            <div class="nav-return border">
                <p><span>Returns</span></p>
                <p class="nav-sec">& Orders</p>
            </div>


            <div class="nav-cart border">
                <i class="fa-solid fa-cart-shopping"></i>
                Cart
            </div>




        </div>


        <div class="panel">
            <div class="panel-all">
                <i class="fa-solid fa-bars"></i>
                All
            </div>
            <div class="panel-ops">
                <div class="freshy">
                    <p><select class="freshy">
                            <option>
                                Fresh</option>
                        </select></p>
                </div>
                <div class="pr">
                    <p><select class="pr">
                            <option>Prime</option>
                        </select></p>
                </div>
                <p class="ops">

                    MX Player</p>
                <p class="ops"> Sell</p>
                <p class="ops">Bestsellers</p>
                <p class="ops">Today's Deals</p>
                <p class="ops"> Mobiles</p>

                <p class="ops">New Releases</p>
                <p class="ops">Customer Service</p>
                <p class="ops">Electronics</p>
                <p class="ops">Amazon Pay</p>
                <p class="ops"> Fashion</p>



                
            </div>
            <div class="panel-deals">
                <p class="first-big">MEGA DEAL DAYS</p>
                <p class="second-big">|LIVE NOW</p>
            </div>

        </div>

    </header>


    <div class="hero-section">
       
    </div>

    <div class="shop-section">
        <div class="box1 box">
            <h2>Health & Personal Care</h2>
            <div class="box-img" style="background-image: url('box1_image.jpg');">
            </div>
            <p>See more</p>
        </div>
        <div class="box2 box">box2</div>
        <div class="box3 box">box3</div>
        <div class="box4 box">box4</div>
    </div>

</body>

</html>
